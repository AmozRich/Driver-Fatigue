<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAS Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0710;
            --primary: #9d4edd;
            --secondary: #5a189a;
            --surface: rgba(36, 15, 60, 0.4);
            --border: rgba(157, 78, 221, 0.2);
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(90, 24, 154, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(157, 78, 221, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphic Side Panel */
        .sidebar {
            width: 320px;
            background: rgba(20, 10, 30, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 4px 0 24px rgba(0,0,0,0.2);
        }

        h1, h2, h3 {
            margin: 0;
            font-weight: 700;
        }

        h1 {
            font-size: 1.7rem;
            background: linear-gradient(135deg, #e0aaff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .launch-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(90, 24, 154, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .launch-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(157, 78, 221, 0.5);
            border-color: rgba(255,255,255,0.3);
        }
        
        .launch-btn:active {
            transform: translateY(1px);
        }

        /* Session List */
        .session-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
        }

        .session-list::-webkit-scrollbar { width: 6px; }
        .session-list::-webkit-scrollbar-track { background: transparent; }
        .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .session-item {
            background: rgba(255,255,255, 0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .session-item:hover {
            background: rgba(157, 78, 221, 0.1);
            border-color: var(--primary);
            color: var(--text-main);
            transform: translateX(4px);
        }
        
        .session-item.active {
            background: linear-gradient(90deg, rgba(157, 78, 221, 0.2), transparent);
            border-left: 3px solid var(--primary);
            color: white;
        }

        /* Main Dashboard */
        .main-content {
            flex-grow: 1;
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .chart-container {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 450px;
            margin-top: 2rem;
            box-shadow: inset 0 0 40px rgba(90, 24, 154, 0.05);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2.5rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--surface), rgba(20, 10, 30, 0.2));
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 1.8rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 100px; height: 100px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.1;
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #e0aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 1.2rem;
            flex-direction: column;
            gap: 1rem;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        #alertContainer {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            font-weight: 600;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #alertContainer.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <div id="alertContainer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>System Launched Successfully!</span>
    </div>

    <aside class="sidebar">
        <div>
            <h1>ADAS Core</h1>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top:0.5rem">Driver Monitoring System Dashboard</p>
        </div>
        
        <button class="launch-btn" onclick="launchSystem()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="10 8 16 12 10 16 10 8"></polygon>
            </svg>
            START MONITORING
        </button>
        
        <h3 style="margin-top: 2rem; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8">Session History</h3>
        <ul class="session-list" id="sessionList">
            <!-- Populated by JS -->
        </ul>
    </aside>

    <main class="main-content">
        <div>
            <h2 id="sessionTitle" style="font-size: 2rem;">Overview Analytics</h2>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 0.5rem">Select a session from the sidebar to review your driving metrics.</p>
        </div>

        <div class="stat-grid" id="statGrid" style="display: none; transform: translateY(20px); opacity: 0; transition: all 0.5s ease; animation: fadeInUp 0.5s forwards;">
            <div class="stat-card">
                <span class="stat-value" id="statMaxFatigue">0.0</span>
                <span style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500;">Highest Fatigue Score</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="statDistractions">0</span>
                <span style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500;">Phone/Bottle Distractions</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="statBlinks">0</span>
                <span style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500;">Avg Blinks per Minute</span>
            </div>
        </div>

        <div class="chart-container">
            <div id="emptyChartState" class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; color: var(--primary)"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                <span>Awaiting session selection...</span>
            </div>
            <canvas id="fatigueChart" style="display: none;"></canvas>
        </div>
    </main>

    <style>
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        let myChart = null;

        fetch('/api/logs')
            .then(res => res.json())
            .then(files => {
                const list = document.getElementById('sessionList');
                files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'session-item';
                    
                    // Format filename (session_2026-04-13_13-14-24.csv) -> 2026-04-13 13:14:24
                    let niceName = file.replace('session_', '').replace('.csv', '');
                    niceName = niceName.replace('_', ' at ').replace(/-/g, '/');
                    // quick fix for time hyphens
                    const parts = niceName.split(' at ');
                    if(parts.length > 1) {
                        parts[1] = parts[1].replace(/\//g, ':');
                        niceName = parts[0] + ' - ' + parts[1];
                    }
                    
                    li.textContent = niceName;
                    li.onclick = () => {
                        document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        loadSession(file, niceName);
                    };
                    list.appendChild(li);
                });
            });

        function launchSystem() {
            fetch('/api/launch')
                .then(res => res.json())
                .then(data => {
                    const alert = document.getElementById('alertContainer');
                    alert.classList.add('show');
                    setTimeout(() => alert.classList.remove('show'), 3500);
                });
        }

        function loadSession(filename, niceName) {
            fetch(`/api/logs/${filename}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('emptyChartState').style.display = 'none';
                    document.getElementById('fatigueChart').style.display = 'block';
                    document.getElementById('statGrid').style.display = 'grid';
                    document.getElementById('sessionTitle').textContent = `Log: ${niceName}`;

                    renderChart(data);
                    renderStats(data);
                });
        }

        function renderStats(data) {
            let maxF = 0;
            let disCount = 0;
            let totalBlinks = 0;
            let inDistraction = false;

            data.forEach(row => {
                const fScore = parseFloat(row.Fatigue_Score);
                if (fScore > maxF) maxF = fScore;
                
                totalBlinks += parseInt(row.Blinks_Per_Min);

                const obj = row.Distraction_Object;
                if (obj !== "None" && !inDistraction) {
                    disCount++;
                    inDistraction = true;
                } else if (obj === "None") {
                    inDistraction = false;
                }
            });

            const avgBlinks = data.length > 0 ? (totalBlinks / data.length).toFixed(0) : 0;

            document.getElementById('statMaxFatigue').textContent = maxF.toFixed(1);
            document.getElementById('statDistractions').textContent = disCount;
            document.getElementById('statBlinks').textContent = avgBlinks;
        }

        function renderChart(data) {
            const ctx = document.getElementById('fatigueChart').getContext('2d');
            
            const labels = data.map(d => d.Timestamp);
            const fatigueScores = data.map(d => parseFloat(d.Fatigue_Score));
            
            // Plot warnings/alerts on the same chart
            const alerts = data.map(d => d.Status === "DROWSINESS ALERT" ? parseFloat(d.Fatigue_Score) : null);

            if (myChart) {
                myChart.destroy();
            }

            Chart.defaults.color = '#adb5bd';
            Chart.defaults.font.family = 'Inter';

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Fatigue Score',
                            data: fatigueScores,
                            borderColor: '#9d4edd',
                            backgroundColor: (context) => {
                                const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                                gradient.addColorStop(0, 'rgba(157, 78, 221, 0.4)');
                                gradient.addColorStop(1, 'rgba(157, 78, 221, 0.01)');
                                return gradient;
                            },
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 6
                        },
                        {
                            label: 'Critical Alerts',
                            data: alerts,
                            backgroundColor: '#ff0a54',
                            pointBackgroundColor: '#ff0a54',
                            pointBorderColor: 'white',
                            pointBorderWidth: 2,
                            pointRadius: 6,
                            pointStyle: 'circle',
                            showLine: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { 
                                color: '#f8f9fa',
                                usePointStyle: true,
                                boxWidth: 8
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20, 10, 30, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#e0aaff',
                            borderColor: 'rgba(157, 78, 221, 0.3)',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.03)' },
                            border: { dash: [4, 4] }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 8, maxRotation: 0 }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
